name = "mayura-bot"
main = "src/index.js"
compatibility_date = "2026-03-24"

[[kv_namespaces]]
binding = "SUBSCRIBERS"
id = "16f852aca70c4596a93845091d054e10"

[[r2_buckets]]
binding = "PDF_CACHE"
bucket_name = "mayura-pdf-cache"

[vars]
GITHUB_REPO = "agasthya36/ezine"

[secrets]
required = ["SECRET_PATH", "GITHUB_TOKEN", "TELEGRAM_BOT_TOKEN", "CLOUDFLARE_API", "ADMIN_TOKEN", "ADMIN_CHAT_ID"]

[triggers]
crons = [
  "30 2 2 * *",   # Mayura: 2nd of every month at 02:30 UTC (08:00 IST)
  "30 2 * * 2",   # Sudha: every Tuesday at 02:30 UTC (08:00 IST)
  "30 1 * * *",   # Prajavani: every day at 01:30 UTC (07:00 IST)
  "0 * * * *",    # Health check: every hour
  "15 3 * * *",   # Pruning: every day at 03:15 UTC (08:45 IST)
]
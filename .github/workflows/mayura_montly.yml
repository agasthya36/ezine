name: Mayura Monthly Upload + Broadcast

on:
  schedule:
    # 2nd of every month at 6:00 AM UTC (11:30 AM IST)
    - cron: "0 6 2 * *"
  workflow_dispatch:   # manual trigger from GitHub UI

jobs:
  download-upload-and-broadcast:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests aiohttp Pillow

      - name: Compute edition date (1st of current month)
        id: date
        run: |
          echo "edition_date=$(date +'01/%m/%Y')" >> $GITHUB_OUTPUT
          echo "month_label=$(date +'%B %Y')"     >> $GITHUB_OUTPUT
          echo "month_key=$(date +'%Y-%m')"       >> $GITHUB_OUTPUT

      - name: Download Mayura edition
        run: |
          python mayura_download.py \
            --date "${{ steps.date.outputs.edition_date }}" \
            --scale 0.7 \
            --output mayura_latest.pdf

      - name: Upload PDF to Cloudflare R2 cache
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx -y wrangler r2 object put \
            "mayura-pdf-cache/pdfs/${{ steps.date.outputs.month_key }}/mayura_${{ steps.date.outputs.month_key }}.pdf" \
            --file mayura_latest.pdf \
            --remote

      - name: Trigger Worker broadcast from cache
        env:
          WORKER_BASE_URL: ${{ secrets.WORKER_BASE_URL }}
          WORKER_ADMIN_TOKEN: ${{ secrets.WORKER_ADMIN_TOKEN }}
        run: |
          RESP="$(curl -sS -w '\n%{http_code}' -X POST \"${WORKER_BASE_URL}/admin/run-monthly?token=${WORKER_ADMIN_TOKEN}\")"
          BODY="$(echo \"$RESP\" | sed '$d')"
          CODE="$(echo \"$RESP\" | tail -n1)"
          echo "Worker response code: $CODE"
          echo "Worker response body: $BODY"
          if [ "$CODE" != "200" ]; then
            echo "::error::Worker trigger failed with HTTP $CODE"
            exit 1
          fi

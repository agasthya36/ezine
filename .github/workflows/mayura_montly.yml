name: Mayura Monthly Upload + Broadcast

on:
  workflow_dispatch:   # manual trigger from GitHub UI or CF cron

permissions:
  contents: read

jobs:
  download-upload-and-broadcast:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests aiohttp pypdf

      - name: Compute edition date (1st of current month)
        id: date
        run: |
          echo "edition_date=$(date +'01/%m/%Y')" >> $GITHUB_OUTPUT
          echo "month_label=$(date +'%B %Y')"     >> $GITHUB_OUTPUT
          echo "month_key=$(date +'%Y-%m')"       >> $GITHUB_OUTPUT

      - name: Download Mayura edition
        run: |
          python mayura_download.py \
            --publication mayura \
            --date "${{ steps.date.outputs.edition_date }}" \
            --output mayura_latest.pdf

      - name: Upload PDF to Cloudflare R2 cache
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx -y wrangler r2 object put \
            "mayura-pdf-cache/pdfs/${{ steps.date.outputs.month_key }}/mayura_${{ steps.date.outputs.month_key }}.pdf" \
            --file mayura_latest.pdf \
            --remote

      - name: Broadcast Mayura to subscribers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          python mayura_broadcast.py \
            --publication mayura \
            --date-key "${{ steps.date.outputs.month_key }}" \
            --pdf-file mayura_latest.pdf \
            --kv-namespace-id 16f852aca70c4596a93845091d054e10

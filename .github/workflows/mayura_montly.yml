name: Mayura Monthly Download

on:
  schedule:
    # 2nd of every month at 6:00 AM UTC (11:30 AM IST)
    - cron: "0 6 2 * *"
  workflow_dispatch:   # manual trigger from GitHub UI

jobs:
  download-and-email:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests Pillow google-api-python-client google-auth

      - name: Compute edition date (1st of current month)
        id: date
        run: |
          echo "edition_date=$(date +'01/%m/%Y')" >> $GITHUB_OUTPUT
          echo "month_label=$(date +'%B %Y')"     >> $GITHUB_OUTPUT

      - name: Download Mayura edition
        run: |
          python mayura_download.py \
            --date "${{ steps.date.outputs.edition_date }}" \
            --output mayura_latest.pdf

      - name: Upload to Drive and send email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          GDRIVE_CREDENTIALS_JSON: ${{ secrets.GDRIVE_CREDENTIALS_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          MONTH_LABEL: ${{ steps.date.outputs.month_label }}
        run: python send_email.py
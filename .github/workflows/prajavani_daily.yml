name: Prajavani Daily Upload

on:
  schedule:
    # Daily at 6:00 AM UTC (11:30 AM IST)
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests aiohttp Pillow

      - name: Compute edition date
        id: date
        run: |
          echo "edition_date=$(date +'%d/%m/%Y')" >> $GITHUB_OUTPUT
          echo "date_key=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Download Prajavani edition
        run: |
          python mayura_download.py \
            --publication prajavani \
            --edition 4 \
            --date "${{ steps.date.outputs.edition_date }}" \
            --scale 0.7 \
            --output prajavani_latest.pdf

      - name: Upload PDF to Cloudflare R2 cache
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx -y wrangler r2 object put \
            "mayura-pdf-cache/pdfs/prajavani/${{ steps.date.outputs.date_key }}/prajavani_${{ steps.date.outputs.date_key }}_e4.pdf" \
            --file prajavani_latest.pdf \
            --remote

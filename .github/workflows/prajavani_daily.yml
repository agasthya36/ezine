name: Prajavani Daily Upload + Broadcast

on:
  workflow_dispatch:

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests aiohttp pypdf

      - name: Compute edition date
        id: date
        run: |
          echo "edition_date=$(date +'%d/%m/%Y')" >> $GITHUB_OUTPUT
          echo "date_key=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Download Prajavani edition
        run: |
          python mayura_download.py \
            --publication prajavani \
            --edition 4 \
            --date "${{ steps.date.outputs.edition_date }}" \
            --output prajavani_latest.pdf

      - name: Upload PDF to Cloudflare R2 cache
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx -y wrangler r2 object put \
            "mayura-pdf-cache/pdfs/prajavani/${{ steps.date.outputs.date_key }}/prajavani_${{ steps.date.outputs.date_key }}_e4.pdf" \
            --file prajavani_latest.pdf \
            --remote

      - name: Trigger Worker daily Prajavani broadcast from cache
        env:
          WORKER_BASE_URL: ${{ secrets.WORKER_BASE_URL }}
          WORKER_ADMIN_TOKEN: ${{ secrets.WORKER_ADMIN_TOKEN }}
        run: |
          BASE="${WORKER_BASE_URL%/}"
          URL="${BASE}/admin/run-daily-prajavani"
          RESP="$(curl -sS -w '\n%{http_code}' -X POST "$URL" -H "x-admin-token: ${WORKER_ADMIN_TOKEN}")"
          BODY="$(echo "$RESP" | sed '$d')"
          CODE="$(echo "$RESP" | tail -n1)"
          echo "Worker response code: $CODE"
          echo "Worker response body: $BODY"
          if [ "$CODE" != "200" ]; then
            echo "::error::Worker trigger failed with HTTP $CODE"
            exit 1
          fi

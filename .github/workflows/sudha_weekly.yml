name: Sudha Weekly Upload + Broadcast

on:
  schedule:
    # Every Thursday at 6:00 AM UTC (11:30 AM IST)
    - cron: "0 6 * * 4"
  workflow_dispatch:

jobs:
  download-upload-and-broadcast:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests aiohttp pypdf

      - name: Compute edition date + week key
        id: date
        run: |
          echo "edition_date=$(date +'%d/%m/%Y')" >> $GITHUB_OUTPUT
          echo "week_key=$(date +'%G-W%V')"       >> $GITHUB_OUTPUT

      - name: Download Sudha edition
        run: |
          python mayura_download.py \
            --publication sudha \
            --date "${{ steps.date.outputs.edition_date }}" \
            --output sudha_latest.pdf

      - name: Upload PDF to Cloudflare R2 cache
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx -y wrangler r2 object put \
            "mayura-pdf-cache/pdfs/sudha/${{ steps.date.outputs.week_key }}/sudha_${{ steps.date.outputs.week_key }}.pdf" \
            --file sudha_latest.pdf \
            --remote

      - name: Trigger Worker weekly Sudha broadcast from cache
        env:
          WORKER_BASE_URL: ${{ secrets.WORKER_BASE_URL }}
          WORKER_ADMIN_TOKEN: ${{ secrets.WORKER_ADMIN_TOKEN }}
        run: |
          BASE="${WORKER_BASE_URL%/}"
          URL="${BASE}/admin/run-weekly-sudha"
          RESP="$(curl -sS -w '\n%{http_code}' -X POST "$URL" -H "x-admin-token: ${WORKER_ADMIN_TOKEN}")"
          BODY="$(echo "$RESP" | sed '$d')"
          CODE="$(echo "$RESP" | tail -n1)"
          echo "Worker response code: $CODE"
          echo "Worker response body: $BODY"
          if [ "$CODE" != "200" ]; then
            echo "::error::Worker trigger failed with HTTP $CODE"
            exit 1
          fi
